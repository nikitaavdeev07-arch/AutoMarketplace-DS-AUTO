<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DS Auto | Премиум автомобили</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
</head>
<body>
<link rel="stylesheet" href="css/cars.css">
<a href="index.html" class="logo-button" id="dsLogoBtn">DS AUTO</a>

<div class="container">
    <div class="cars-grid" id="carsGrid"></div>
    <div class="footer-message">✦ Оригинальные ПТС · Без ДТП  ✦</div>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <h3>Заказать автомобиль</h3>
        <div class="modal-sub" id="modalCarTitle">Выберите авто в карточке</div>
        <form id="buyerForm">
            <div class="form-group">
                <label>ФИО *</label>
                <input type="text" id="fullName" placeholder="Иванов Иван Петрович" autocomplete="name">
                <div class="error-msg" id="nameError">Укажите корректное ФИО (минимум два слова)</div>
            </div>
            <div class="form-group">
                <label>Номер телефона *</label>
                <input type="tel" id="phone" placeholder="+7 (999) 123-45-67" autocomplete="tel">
                <div class="error-msg" id="phoneError">Введите действующий номер (не менее 10 цифр)</div>
            </div>
            <div class="form-group">
                <label>Электронная почта *</label>
                <input type="email" id="email" placeholder="name@example.com" autocomplete="email">
                <div class="error-msg" id="emailError">Пример: client@dsauto.ru</div>
            </div>
            <div class="modal-buttons">
                <button type="submit" class="submit-btn">Оформить</button>
                <button type="button" class="cancel-btn" id="closeModalBtn">Отмена</button>
            </div>
        </form>
    </div>
</div>

<script>
    const carsData = [
        { brand: "Toyota", model: "Land Cruiser", year: 2022, price: 13500000, monthly: 107221, mileage: "2 316 км", engine: "3.3 D AT (299 л.с.)", fuelDrive: "Дизель, Полный", city: "Ставрополь", dtp: "Без ДТП", owners: "Один владелец", pts: "Оригинал ПТС", imageUrl: "https://avatars.mds.yandex.net/i?id=a3846ca23a35769f44793d661fe8d4cb4202ac97-5438832-images-thumbs&n=13", alt: "Toyota Land Cruiser" },
        { brand: "Toyota", model: "Camry", year: 2024, price: 3500000, monthly: 78900, mileage: "26 200 км", engine: "2.0 CVT (173 л.с.)", fuelDrive: "Бензин, Передний", city: "Ставрополь", dtp: "Без ДТП", owners: "Один владелец", pts: "Оригинал ПТС", imageUrl: "https://avatars.mds.yandex.net/i?id=3358429bb05dadda31f14b3ac596a9a90587276a-9227066-images-thumbs&n=13", alt: "Toyota Camry" },
        { brand: "Toyota", model: "Yaris GR", year: 2021, price: 4450000, monthly: 95300, mileage: "34 150 км", engine: "1.6 4WD MT (272 л.с.)", fuelDrive: "Бензин, Полный", city: "Ставрополь", dtp: "Без ДТП", owners: "Один владелец", pts: "Оригинал ПТС", imageUrl: "https://avatars.mds.yandex.net/i?id=2775005a7dac8fd8eb72bf2cc300cb4a2da66730-10471591-images-thumbs&n=13", alt: "Toyota Yaris" },
        { brand: "Toyota", model: "GR86", year: 2022, price: 2950000, monthly: 63000, mileage: "18 740 км", engine: "2.4 AT (235 л.с.)", fuelDrive: "Бензин, Задний", city: "Ставрополь", dtp: "Без ДТП", owners: "Один владелец", pts: "Оригинал ПТС", imageUrl: "https://avatars.mds.yandex.net/i?id=92084e4a5cf40b663001f474dc68321270a934fa-5310557-images-thumbs&n=13", alt: "Toyota GR86" },
        { brand: "Toyota", model: "GT86", year: 2014, price: 1800000, monthly: 39200, mileage: "75 300 км", engine: "2.0 AT (200 л.с.)", fuelDrive: "Бензин, Задний", city: "Ставрополь", dtp: "Без ДТП", owners: "Один владелец", pts: "Оригинал ПТС", imageUrl: "https://avatars.mds.yandex.net/i?id=e69b3388d9906a9515ee23b8014edd9bc9d16be9-10915107-images-thumbs&n=13", alt: "Toyota GT86" },
        { brand: "Toyota", model: "Corolla", year: 2021, price: 2100000, monthly: 45800, mileage: "28 520 км", engine: "1.5 CVT (121 л.с.)", fuelDrive: "Бензин, Передний", city: "Ставрополь", dtp: "Без ДТП", owners: "Один владелец", pts: "Оригинал ПТС", imageUrl: "https://avatars.mds.yandex.net/i?id=870f62767cc3092007495c1ec6b3511321ed3ac3-4256731-images-thumbs&n=13", alt: "Toyota Corolla" },
    ];

    function renderCards() {
        const grid = document.getElementById('carsGrid');
        if (!grid) return;
        grid.innerHTML = '';

        carsData.forEach((car) => {
            const card = document.createElement('div');
            card.className = 'car-card';

            const brandDiv = document.createElement('div');
            brandDiv.className = 'card-brand';
            brandDiv.innerHTML = `
                <div class="brand-name">${car.brand} ${car.model}</div>
                <div class="brand-year">${car.year}</div>
            `;
            
            const imageWrapper = document.createElement('div');
            imageWrapper.className = 'image-wrapper';
            const img = document.createElement('img');
            img.src = car.imageUrl;
            img.alt = car.alt || `${car.brand} ${car.model}`;
            img.className = 'car-image';
            img.loading = "lazy";
            img.onerror = function() {
                this.src = "https://placehold.co/800x500/1a2128/9eb0c2?text=" + encodeURIComponent(car.brand + " " + car.model);
                this.alt = `${car.brand} ${car.model}`;
            };
            imageWrapper.appendChild(img);
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'card-content';
            
            const priceSpan = document.createElement('div');
            priceSpan.className = 'price';
            priceSpan.innerHTML = `${window.formatPrice(car.price)} <small>₽</small>`;
            
            const badgesDiv = document.createElement('div');
            badgesDiv.className = 'badge-stats';
            badgesDiv.innerHTML = `
                <span class="chip">${car.dtp}</span>
                <span class="chip">${car.owners}</span>
                <span class="chip">${car.pts}</span>
            `;
            
            const specsDiv = document.createElement('div');
            specsDiv.className = 'specs';
            specsDiv.innerHTML = `<strong>${car.engine}</strong><br>${car.fuelDrive}`;
            
            const mileLoc = document.createElement('div');
            mileLoc.className = 'mileage-location';
            mileLoc.innerHTML = `
                <span>📊 ${car.mileage}</span>
                <span>📍 ${car.city}</span>
            `;
            
            const monthlySpan = document.createElement('div');
            monthlySpan.className = 'monthly';
            monthlySpan.innerHTML = `От ${car.monthly.toLocaleString('ru-RU')} ₽/мес. · Премиум`;
            
            const buyBtn = document.createElement('button');
            buyBtn.className = 'btn-buy';
            buyBtn.innerText = 'Купить';
            buyBtn.addEventListener('click', (e) => {
                e.preventDefault();
                window.openOrderModal(car);
            });
            
            contentDiv.appendChild(priceSpan);
            contentDiv.appendChild(badgesDiv);
            contentDiv.appendChild(specsDiv);
            contentDiv.appendChild(mileLoc);
            contentDiv.appendChild(monthlySpan);
            contentDiv.appendChild(buyBtn);
            
            card.appendChild(brandDiv);
            card.appendChild(imageWrapper);
            card.appendChild(contentDiv);
            grid.appendChild(card);
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderCards();

        if (window.initEventHandlers) {
            window.initEventHandlers();
        }
    });
</script>
<script src="js/cars.js"></script>
</body>
</html>
